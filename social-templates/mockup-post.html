<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080x1350">
    <title>Social Card Mockup - d4lab.es</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a192f;
            --primary-accent: #64ffda;
            --secondary-accent: #112240; 
            --text-main: #ccd6f6;
            --text-dim: #8892b1;
            --glass: rgba(17, 34, 64, 0.4);
            --glass-border: rgba(100, 255, 218, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1350px;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 100% 100%, rgba(239, 68, 68, 0.05) 0%, transparent 40%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .header {
            width: 100%;
            padding: 80px 100px 40px;
            text-align: center;
        }

        .badge {
            background: rgba(100, 255, 218, 0.15);
            color: var(--primary-accent);
            border: 1px solid var(--glass-border);
            padding: 12px 30px;
            border-radius: 100px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            font-size: 72px;
            line-height: 1.1;
            color: #fff;
            text-shadow: 0 0 20px rgba(100, 255, 218, 0.2);
        }

        .mockup-container {
            width: 880px;
            height: 600px;
            background: var(--glass);
            border: 8px solid var(--glass-border);
            border-radius: 40px;
            margin: 40px 0;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mockup-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Se reemplaza por la URL de la imagen real en el renderizado */
            background-image: url('{{MOCKUP_IMAGE_URL}}');
            background-size: cover;
            background-position: center;
        }

        .footer {
            width: 100%;
            padding: 40px 100px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info {
            max-width: 600px;
        }

        .tagline {
            font-size: 32px;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 36px;
            font-weight: 800;
            color: #fff;
        }

        .dot { color: var(--primary-accent); }

    </style>
</head>
<body>
    <div class="header">
        <div class="badge">Nuevo Proyecto</div>
        <h1 class="title">{{PROJECT_NAME}}</h1>
    </div>

    <div class="mockup-container">
        <div class="mockup-img"></div>
    </div>

    <div class="footer">
        <div class="info">
            <p class="tagline">{{DESCRIPTION}}</p>
        </div>
        <div class="logo">
            d4lab<span class="dot">.</span>es
        </div>
    </div>
</body>
</html>
