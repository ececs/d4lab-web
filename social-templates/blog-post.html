<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080x1350">
    <title>Social Card Feed - d4lab.es</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a192f; --accent: #64ffda; --dim: #8892b1; --glass: rgba(17, 34, 64, 0.4); --border: rgba(100, 255, 218, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 1080px; height: 1350px; background-color: var(--bg); background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15) 0%, transparent 50%); font-family: 'Inter', sans-serif; color: #ccd6f6; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { width: 920px; height: 1190px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 60px; padding: 80px; display: flex; flex-direction: column; justify-content: space-between; position: relative; box-shadow: 0 0 40px rgba(100, 255, 218, 0.05); }
        .card::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(135deg, var(--accent), #112240); border-radius: 62px; z-index: -1; opacity: 0.3; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .badge { background: rgba(100, 255, 218, 0.15); color: var(--accent); border: 1px solid var(--border); padding: 12px 24px; border-radius: 20px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 28px; text-transform: uppercase; }
        .title { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 84px; line-height: 1.1; margin: 40px 0; color: #fff; text-shadow: 0 0 20px rgba(100, 255, 218, 0.2); }
        .summary { font-size: 36px; line-height: 1.6; color: var(--dim); max-width: 85%; }
        .footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 42px; font-weight: 800; color: #fff; }
        .dot { color: var(--accent); }
        .cta { font-size: 26px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="badge">{{TYPE}}</div>
            <div class="logo">d4lab<span class="dot">.</span>es</div>
        </div>
        <div class="content">
            <h1 class="title">{{TITLE}}</h1>
            <p class="summary">{{SUMMARY}}</p>
        </div>
        <div class="footer">
            <span class="logo">d4lab<span class="dot">.</span>es</span>
            <div class="cta">🔗 Ver enlace en el post</div>
        </div>
    </div>
</body>
</html>
